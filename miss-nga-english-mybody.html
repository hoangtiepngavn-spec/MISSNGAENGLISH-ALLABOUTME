<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miss Nga English — My Body</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0F3554; --navy-deep:#0A2540; --teal:#1E9C90; --teal-light:#4FC3B8;
    --orange:#F4993B; --orange-light:#FFC178; --sand:#FFF6E9; --white:#FFFFFF; --wrong:#E4572E;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;font-family:Arial, Helvetica, sans-serif;background:var(--sand);overflow:hidden;}
  #app{position:relative;width:100%;height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(180deg,#D9F0EC 0%, #9FDCCF 35%, var(--teal) 70%, var(--navy) 100%);}
  .wave-layer{position:absolute;left:0; right:0; bottom:0;width:200%;height:120px;background-repeat:repeat-x;opacity:0.5;animation:drift 14s linear infinite;}
  .wave-layer.w1{bottom:0;background:radial-gradient(circle at 30px 0, transparent 24px, var(--navy-deep) 25px) repeat-x;background-size:60px 40px;opacity:0.3;animation-duration:18s;}
  .wave-layer.w2{bottom:6px;background:radial-gradient(circle at 30px 0, transparent 20px, var(--orange) 21px) repeat-x;background-size:50px 34px;opacity:0.4;animation-duration:11s;animation-direction:reverse;}
  @keyframes drift{ from{transform:translateX(0);} to{transform:translateX(-50%);} }
  .bubble{position:absolute;bottom:-40px;border-radius:50%;background:rgba(255,255,255,0.35);animation:rise linear infinite;}
  @keyframes rise{0%{transform:translateY(0) translateX(0); opacity:0.7;}100%{transform:translateY(-110vh) translateX(20px); opacity:0;}}
  .screen{position:relative;z-index:2;width:100%;max-width:560px;height:100%;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:24px;text-align:center;}
  .hidden{display:none !important;}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .brand-badge{width:38px;height:38px;border-radius:50%;background:var(--orange);display:flex;align-items:center;
    justify-content:center;font-weight:800;color:var(--white);font-family:'Baloo 2', Arial, sans-serif;font-size:18px;
    box-shadow:0 3px 0 rgba(0,0,0,0.15);}
  .brand-name{font-family:Arial, sans-serif;font-weight:700;letter-spacing:0.5px;color:var(--white);font-size:15px;text-transform:uppercase;}
  .title-card{background:var(--white);border-radius:28px;padding:32px 26px 26px;box-shadow:0 14px 0 rgba(10,37,64,0.25);
    border:4px solid var(--navy);width:100%;}
  .kicker{font-family:Arial, sans-serif;font-weight:700;font-size:13px;letter-spacing:2px;color:var(--teal);
    text-transform:uppercase;margin-bottom:6px;}
  h1.game-title{font-family:'Baloo 2', Arial, sans-serif;font-weight:800;font-size:34px;color:var(--navy-deep);
    line-height:1.05;margin-bottom:6px;}
  .subtitle{font-family:Arial, sans-serif;color:var(--navy);font-size:15px;margin-bottom:18px;}
  .btn{font-family:Arial, sans-serif;font-weight:700;font-size:16px;border:none;border-radius:16px;padding:14px 10px;
    cursor:pointer;color:var(--white);background:var(--orange);box-shadow:0 6px 0 #C8722A;transition:transform .08s ease;}
  .btn:active{ transform:translateY(4px); box-shadow:0 2px 0 #C8722A; }
  .btn.secondary{background:var(--teal);box-shadow:0 6px 0 #147A70;}
  .btn.secondary:active{ box-shadow:0 2px 0 #147A70; }
  .btn.small{ font-size:14px; padding:9px 18px; border-radius:12px; }
  .hint{margin-top:14px;font-size:12.5px;color:var(--navy);opacity:0.75;}
  .age-select-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px;}
  .age-btn:nth-child(1){background:#8BC34A;box-shadow:0 6px 0 #5E8C2E;}
  .age-btn:nth-child(1):active{box-shadow:0 2px 0 #5E8C2E;}
  .age-btn:nth-child(2){background:var(--teal);box-shadow:0 6px 0 #147A70;}
  .age-btn:nth-child(2):active{box-shadow:0 2px 0 #147A70;}
  .age-btn:nth-child(3){background:#5AA9E6;box-shadow:0 6px 0 #2E7EBF;}
  .age-btn:nth-child(3):active{box-shadow:0 2px 0 #2E7EBF;}
  .age-btn:nth-child(4){background:var(--orange);box-shadow:0 6px 0 #C8722A;}
  .age-btn:nth-child(4):active{box-shadow:0 2px 0 #C8722A;}
  .age-btn:nth-child(5){background:#E4572E;box-shadow:0 6px 0 #B33D1B;grid-column:span 2;}
  .age-btn:nth-child(5):active{box-shadow:0 2px 0 #B33D1B;}
  .current-age-badge{display:inline-block;background:rgba(255,255,255,0.2);color:var(--white);font-family:Arial,sans-serif;
    font-weight:700;font-size:12.5px;padding:4px 12px;border-radius:12px;}
  .topbar{width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;color:var(--white);font-family:Arial, sans-serif;}
  .stars{font-weight:800;font-size:18px;background:rgba(255,255,255,0.18);padding:6px 14px;border-radius:20px;}
  .progress-dots{display:flex;gap:5px;flex-wrap:wrap;max-width:130px;}
  .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.35);}
  .dot.done{ background:var(--navy-deep); }
  .close-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.18);border:none;color:var(--white);font-size:16px;cursor:pointer;}
  .question-card{background:var(--white);border-radius:26px;padding:22px 20px 26px;width:100%;border:4px solid var(--navy);
    box-shadow:0 12px 0 rgba(10,37,64,0.22);}
  .listen-row{display:flex;flex-direction:column;align-items:center;margin-bottom:18px;}
  .speaker-btn{width:86px;height:86px;border-radius:50%;background:var(--teal);border:none;color:var(--white);font-size:34px;
    cursor:pointer;box-shadow:0 6px 0 #147A70;display:flex;align-items:center;justify-content:center;animation:pulse 2.4s infinite;}
  .speaker-btn:active{ transform:translateY(4px); box-shadow:0 2px 0 #147A70; animation:none;}
  @keyframes pulse{0%,100%{ box-shadow:0 6px 0 #147A70, 0 0 0 0 rgba(30,156,144,0.4);}50%{ box-shadow:0 6px 0 #147A70, 0 0 0 14px rgba(30,156,144,0);}}
  .listen-label{margin-top:10px;font-family:Arial, sans-serif;font-weight:700;color:var(--navy);font-size:14px;}
  .options-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .option-card{background:var(--sand);border:3px solid var(--navy-deep);border-radius:18px;padding:6px;cursor:pointer;
    transition:transform .08s ease, background .15s ease, border-color .15s ease;display:flex;align-items:center;justify-content:center;
    height:126px;overflow:hidden;}
  .option-card img{ width:100%; height:100%; object-fit:contain; pointer-events:none; }
  .option-card:hover{ transform:translateY(-3px); }
  .option-card.correct{ background:#DFF3E4; border-color:#2E9E5B; }
  .option-card.wrong{ background:#FBE0DA; border-color:var(--wrong); }
  .option-card:disabled{ cursor:default; }
  .feedback{margin-top:14px;min-height:22px;font-family:Arial, sans-serif;font-weight:700;font-size:15px;}
  .feedback.good{ color:#2E9E5B; } .feedback.bad{ color:var(--wrong); }
  .story-panel{ width:100%; }
  .story-hero{ width:220px; height:220px; margin:0 auto 10px; display:flex; align-items:center; justify-content:center;
    border-radius:18px; overflow:hidden; background:var(--sand); }
  .story-hero img{ max-width:100%; max-height:100%; object-fit:contain; }
  .story-sentence{ font-family:Arial, sans-serif; font-size:17px; color:var(--navy-deep); font-weight:600; min-height:50px;
    display:flex; align-items:center; justify-content:center; padding:0 6px; }
  .story-controls{ margin-top:14px; display:flex; gap:10px; justify-content:center; }
  .end-card{background:var(--white);border-radius:28px;padding:34px 26px;border:4px solid var(--navy);
    box-shadow:0 14px 0 rgba(10,37,64,0.25);width:100%;}
  .end-emoji{ font-size:56px; margin-bottom:6px; }
  .end-score{font-family:'Baloo 2', Arial, sans-serif;font-weight:800;font-size:30px;color:var(--navy-deep);margin-bottom:4px;}
  .end-note{font-family:Arial, sans-serif;color:var(--navy);font-size:14px;margin-bottom:20px;}
  .btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .footer-brand{margin-top:16px;font-family:Arial, sans-serif;font-size:12px;color:rgba(255,255,255,0.85);letter-spacing:0.3px;}
</style>
</head>
<body>
<div id="app">
  <div class="wave-layer w1"></div>
  <div class="wave-layer w2"></div>

  <div class="screen" id="screen-start">
    <div class="brand">
      <div class="brand-badge">NE</div>
      <div class="brand-name">Miss Nga English</div>
    </div>
    <div class="title-card">
      <div class="kicker">Listen &amp; Click</div>
      <h1 class="game-title">Nghe &amp; Bấm<br>My Body 👀👃👄</h1>
      <p class="subtitle">Chọn độ tuổi lớp học — nghe từ, bấm hình đúng, nghe đúng mẫu câu của độ tuổi!</p>
      <div class="age-select-grid">
        <button class="btn age-btn" data-age="0">1 tuổi</button>
        <button class="btn age-btn" data-age="1">2 tuổi</button>
        <button class="btn age-btn" data-age="2">3 tuổi</button>
        <button class="btn age-btn" data-age="3">4 tuổi</button>
        <button class="btn age-btn" data-age="4">5 tuổi</button>
      </div>
      <div class="hint">Đeo tai nghe hoặc mở loa để nghe rõ nhất 🔊</div>
    </div>
    <div class="footer-brand">Miss Nga English · 0965 528 599</div>
  </div>

  <div class="screen hidden" id="screen-play">
    <div class="topbar">
      <div class="progress-dots" id="progress-dots"></div>
      <div class="current-age-badge" id="current-age-badge"></div>
      <div class="stars" id="stars-display">⭐ 0</div>
      <button class="close-btn" id="btn-close" title="Đóng">✕</button>
    </div>
    <div class="question-card" id="question-card">
      <div id="quiz-mode">
        <div class="listen-row">
          <button class="speaker-btn" id="btn-speak">🔊</button>
          <div class="listen-label">Bấm để nghe từ</div>
        </div>
        <div class="options-grid" id="options-grid"></div>
        <div class="feedback" id="feedback"></div>
      </div>
      <div id="story-mode" class="hidden">
        <div class="story-panel">
          <div class="story-hero"><img id="story-img" src="" alt=""></div>
          <div class="story-sentence" id="story-sentence">...</div>
          <div class="story-controls">
            <button class="btn small secondary" id="btn-story-replay">🔊 Nghe lại</button>
            <button class="btn small" id="btn-story-next">Từ tiếp theo ▶</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="screen hidden" id="screen-end">
    <div class="end-card">
      <div class="end-emoji">🏆</div>
      <div class="end-score" id="end-score">0 / 0</div>
      <div class="end-note" id="end-note">Con làm rất tốt!</div>
      <div class="btn-row">
        <button class="btn secondary" id="btn-replay">🔁 Chơi lại</button>
      </div>
    </div>
    <div class="footer-brand">Miss Nga English · 0965 528 599</div>
  </div>
</div>

  const AGE_NAMES = ['1 tuổi','2 tuổi','3 tuổi','4 tuổi','5 tuổi'];

  const screenStart = document.getElementById('screen-start');
  const screenPlay  = document.getElementById('screen-play');
  const screenEnd   = document.getElementById('screen-end');
  const btnClose  = document.getElementById('btn-close');
  const btnReplay = document.getElementById('btn-replay');
  const btnSpeak  = document.getElementById('btn-speak');
  const starsDisplay  = document.getElementById('stars-display');
  const progressDots  = document.getElementById('progress-dots');
  const currentAgeBadge = document.getElementById('current-age-badge');
  const optionsGrid   = document.getElementById('options-grid');
  const feedbackEl    = document.getElementById('feedback');
  const endScoreEl    = document.getElementById('end-score');
  const endNoteEl     = document.getElementById('end-note');
  const quizMode  = document.getElementById('quiz-mode');
  const storyMode = document.getElementById('story-mode');
  const storyImg  = document.getElementById('story-img');
  const storySentence = document.getElementById('story-sentence');
  const btnStoryReplay = document.getElementById('btn-story-replay');
  const btnStoryNext   = document.getElementById('btn-story-next');

  let sequence = [];
  let currentIndex = 0;
  let score = 0;
  let locked = false;
  let currentAgeIndex = 0;

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]] = [a[j],a[i]]; }
    return a;
  }

  let cachedVoice = null;
  function pickVoice(){
    if(!('speechSynthesis' in window)) return null;
    const voices = window.speechSynthesis.getVoices();
    if(!voices || voices.length === 0) return null;
    let v = voices.find(v => /en-GB/i.test(v.lang) && /female|woman/i.test(v.name));
    if(!v) v = voices.find(v => /en-GB/i.test(v.lang));
    if(!v) v = voices.find(v => /en-US/i.test(v.lang));
    if(!v) v = voices.find(v => /^en/i.test(v.lang));
    return v || null;
  }
  if('speechSynthesis' in window){
    window.speechSynthesis.onvoiceschanged = () => { cachedVoice = pickVoice(); };
    cachedVoice = pickVoice();
  }

  function speak(text){
    if(!text) return;
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    if(!cachedVoice) cachedVoice = pickVoice();
    if(cachedVoice){ utter.voice = cachedVoice; utter.lang = cachedVoice.lang; }
    else { utter.lang = 'en-GB'; }
    utter.rate = 0.65;
    utter.pitch = 1.0;
    window.speechSynthesis.speak(utter);
  }

  let audioCtx = null;
  function getAudioCtx(){
    if(!audioCtx){
      const AC = window.AudioContext || window.webkitAudioContext;
      if(AC) audioCtx = new AC();
    }
    if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function playTone(ctx, freq, startTime, duration, type, gainPeak){
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, startTime);
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(gainPeak || 0.25, startTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(startTime); osc.stop(startTime + duration + 0.02);
  }
  function playCorrectSound(){
    const ctx = getAudioCtx(); if(!ctx) return;
    const t = ctx.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.50];
    notes.forEach((freq, i) => playTone(ctx, freq, t + i*0.24, 0.5, 'triangle', 0.22));
  }
  function playWrongSound(){
    const ctx = getAudioCtx(); if(!ctx) return;
    const t = ctx.currentTime;
    playTone(ctx, 300, t, 0.4, 'sawtooth', 0.15);
    playTone(ctx, 220, t + 0.32, 0.55, 'sawtooth', 0.15);
  }

  function buildProgressDots(){
    progressDots.innerHTML = '';
    for(let i=0;i<sequence.length;i++){
      const d = document.createElement('div'); d.className = 'dot'; d.id = 'dot-'+i;
      progressDots.appendChild(d);
    }
  }
  function markDotDone(i){ const d = document.getElementById('dot-'+i); if(d) d.classList.add('done'); }

  function startGame(ageIndex){
    currentAgeIndex = ageIndex;
    currentAgeBadge.textContent = AGE_NAMES[ageIndex];
    const pool = WORDS.filter(w => w.sentences[ageIndex] && w.sentences[ageIndex].trim().length > 0);
    sequence = shuffle(pool);
    currentIndex = 0; score = 0;
    starsDisplay.textContent = '⭐ 0';
    buildProgressDots();
    screenStart.classList.add('hidden');
    screenEnd.classList.add('hidden');
    screenPlay.classList.remove('hidden');
    loadQuestion();
  }

  function loadQuestion(){
    if(currentIndex >= sequence.length){ finishGame(); return; }
    locked = false;
    quizMode.classList.remove('hidden');
    storyMode.classList.add('hidden');
    feedbackEl.textContent = ''; feedbackEl.className = 'feedback';

    const correct = sequence[currentIndex];
    const distractors = shuffle(sequence.filter(w => w.word !== correct.word)).slice(0,3);
    const options = shuffle([correct, ...distractors]);

    optionsGrid.innerHTML = '';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-card';
      const img = document.createElement('img');
      img.src = opt.img; img.alt = opt.word;
      btn.appendChild(img);
      btn.setAttribute('aria-label', opt.word);
      btn.addEventListener('click', () => handleAnswer(btn, opt, correct));
      optionsGrid.appendChild(btn);
    });

    setTimeout(() => speak(correct.word), 350);
  }

  function handleAnswer(btn, chosen, correct){
    if(locked) return;
    locked = true;
    const allBtns = optionsGrid.querySelectorAll('.option-card');
    allBtns.forEach(b => b.disabled = true);

    if(chosen.word === correct.word){
      btn.classList.add('correct');
      playCorrectSound();
      score++;
      starsDisplay.textContent = '⭐ ' + score;
      feedbackEl.textContent = 'Chính xác! "' + correct.word + '" 🎉';
      feedbackEl.className = 'feedback good';
      markDotDone(currentIndex);
      setTimeout(() => startStory(correct), 1400);
    } else {
      btn.classList.add('wrong');
      playWrongSound();
      allBtns.forEach(b => { if(b.getAttribute('aria-label') === correct.word) b.classList.add('correct'); });
      feedbackEl.textContent = 'Chưa đúng — từ đúng là "' + correct.word + '"';
      feedbackEl.className = 'feedback bad';
      setTimeout(() => startStory(correct), 1300);
    }
  }

  function startStory(word){
    quizMode.classList.add('hidden');
    storyMode.classList.remove('hidden');
    storyImg.src = word.img; storyImg.alt = word.word;
    const sentence = word.sentences[currentAgeIndex];
    storySentence.textContent = sentence;
    setTimeout(() => speak(sentence), 300);
  }

  btnStoryReplay.addEventListener('click', () => {
    const word = sequence[currentIndex];
    speak(word.sentences[currentAgeIndex]);
  });

  btnStoryNext.addEventListener('click', () => {
    currentIndex++;
    loadQuestion();
  });

  function finishGame(){
    screenPlay.classList.add('hidden');
    screenEnd.classList.remove('hidden');
    endScoreEl.textContent = score + ' / ' + sequence.length;
    const ratio = score / sequence.length;
    let note = 'Con làm rất tốt!';
    if(ratio === 1) note = 'Xuất sắc! Con nhớ hết từ vựng rồi 🌟';
    else if(ratio >= 0.7) note = 'Rất tốt! Chỉ cần luyện thêm chút nữa nhé!';
    else note = 'Cố lên! Chơi lại để nhớ từ vựng thật kỹ nha!';
    endNoteEl.textContent = note;
  }

  function resetToStart(){
    window.speechSynthesis && window.speechSynthesis.cancel();
    screenPlay.classList.add('hidden');
    screenEnd.classList.add('hidden');
    screenStart.classList.remove('hidden');
  }

  document.querySelectorAll('.age-btn').forEach(btn => {
    btn.addEventListener('click', () => startGame(parseInt(btn.dataset.age, 10)));
  });
  btnReplay.addEventListener('click', resetToStart);
  btnClose.addEventListener('click', resetToStart);
  btnSpeak.addEventListener('click', () => { const q = sequence[currentIndex]; if(q) speak(q.word); });

  const app = document.getElementById('app');
  function spawnBubble(){
    const b = document.createElement('div');
    const size = 6 + Math.random()*16;
    b.className = 'bubble'; b.style.width = size+'px'; b.style.height = size+'px';
    b.style.left = Math.random()*100+'%'; b.style.animationDuration = (6+Math.random()*6)+'s';
    app.appendChild(b);
    setTimeout(() => b.remove(), 13000);
  }
  setInterval(spawnBubble, 900);
  for(let i=0;i<6;i++) setTimeout(spawnBubble, i*300);
})();
</script>
